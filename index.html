<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Vectorizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e5e2;
      padding: 2.5rem;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #6b6b6b; margin-bottom: 1.75rem; }

    .drop-zone {
      border: 1.5px dashed #d0d0cc;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      background: #f9f9f7;
      border-color: #aaa;
    }
    .drop-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-icon {
      width: 40px; height: 40px;
      background: #f0f0ee;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 10px;
      font-size: 20px; color: #888;
    }
    .drop-label { font-size: 14px; color: #6b6b6b; }
    .drop-label span { color: #1a1a1a; font-weight: 500; text-decoration: underline; }
    .drop-hint { font-size: 12px; color: #aaa; margin-top: 4px; }

    .preview-row {
      display: flex; gap: 10px; align-items: center;
      margin-top: 12px; padding: 10px 12px;
      background: #f9f9f7; border-radius: 10px;
      border: 1px solid #e5e5e2;
    }
    .preview-thumb {
      width: 42px; height: 42px;
      border-radius: 8px; object-fit: cover;
      border: 1px solid #e5e5e2;
    }
    .preview-name {
      flex: 1; font-size: 13px; font-weight: 500;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .preview-size { font-size: 12px; color: #888; }
    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: #aaa; font-size: 18px; padding: 0 2px; line-height: 1;
    }
    .remove-btn:hover { color: #333; }

    .convert-btn {
      width: 100%; margin-top: 1rem;
      padding: 11px; font-size: 15px; font-weight: 600;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .convert-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .convert-btn:hover:not(:disabled) { opacity: 0.82; }

    .progress-wrap { margin-top: 1.25rem; display: none; }
    .progress-header {
      display: flex; justify-content: space-between;
      font-size: 13px; color: #6b6b6b; margin-bottom: 6px;
    }
    .progress-track {
      height: 6px; background: #f0f0ee;
      border-radius: 99px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 0%;
      background: #1a1a1a; border-radius: 99px;
      transition: width 0.4s ease;
    }

    .error-msg {
      margin-top: 1rem; padding: 10px 14px;
      background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 10px; font-size: 13px; color: #dc2626;
      display: none;
    }

    .result-section { margin-top: 1.75rem; display: none; }
    .result-label {
      font-size: 11px; font-weight: 600; color: #aaa;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .svg-preview {
      width: 100%; min-height: 180px;
      background: #f9f9f7;
      border: 1px solid #e5e5e2; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 1.25rem;
    }
    .svg-preview img { max-width: 100%; max-height: 260px; object-fit: contain; }

    .stats-row { display: flex; gap: 8px; margin-top: 10px; }
    .stat {
      flex: 1; background: #f9f9f7;
      border: 1px solid #e5e5e2; border-radius: 10px;
      padding: 8px 10px;
    }
    .stat-label { font-size: 11px; color: #aaa; }
    .stat-value { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-top: 1px; }

    .action-row { display: flex; gap: 8px; margin-top: 10px; }
    .dl-btn {
      flex: 1; padding: 10px;
      font-size: 14px; font-weight: 600;
      background: #1a1a1a; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.2s;
    }
    .dl-btn:hover { opacity: 0.82; }
    .copy-btn {
      padding: 10px 18px; font-size: 14px; font-weight: 500;
      background: #fff; color: #1a1a1a;
      border: 1px solid #d0d0cc; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .copy-btn:hover { background: #f5f5f3; }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI Vectorizer</h1>
    <p class="sub">Convert PNG or JPG images into smooth scalable SVGs</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" />
      <div class="drop-icon">↑</div>
      <div class="drop-label">Drop image here or <span>browse files</span></div>
      <div class="drop-hint">PNG, JPG, WEBP supported</div>
    </div>

    <div class="preview-row" id="previewRow" style="display:none;">
      <img class="preview-thumb" id="previewThumb" src="" alt="preview" />
      <div style="flex:1; min-width:0;">
        <div class="preview-name" id="previewName"></div>
        <div class="preview-size" id="previewSize"></div>
      </div>
      <button class="remove-btn" id="removeBtn">×</button>
    </div>

    <button class="convert-btn" id="convertBtn" disabled>Convert to SVG</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span id="progressText">Uploading image...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="result-section" id="resultSection">
      <div class="result-label">Result</div>
      <div class="svg-preview" id="svgPreview"></div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Original</div>
          <div class="stat-value" id="statOrig">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">SVG size</div>
          <div class="stat-value" id="statSvg">—</div>
        </div>
        <div class="stat">
          <div class="stat-label">Time</div>
          <div class="stat-value" id="statTime">—</div>
        </div>
      </div>
      <div class="action-row">
        <button class="dl-btn" id="downloadBtn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M8 2v8M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download SVG
        </button>
        <button class="copy-btn" id="copyBtn">Copy SVG</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api/vectorize';
    let selectedFile = null;
    let svgContent = null;
    let startTime = null;

    const fileInput    = document.getElementById('fileInput');
    const dropZone     = document.getElementById('dropZone');
    const previewRow   = document.getElementById('previewRow');
    const previewThumb = document.getElementById('previewThumb');
    const previewName  = document.getElementById('previewName');
    const previewSize  = document.getElementById('previewSize');
    const removeBtn    = document.getElementById('removeBtn');
    const convertBtn   = document.getElementById('convertBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const progressPct  = document.getElementById('progressPct');
    const errorMsg     = document.getElementById('errorMsg');
    const resultSection= document.getElementById('resultSection');
    const svgPreview   = document.getElementById('svgPreview');
    const downloadBtn  = document.getElementById('downloadBtn');
    const copyBtn      = document.getElementById('copyBtn');

    function formatBytes(b) {
      if (b < 1024) return b + ' B';
      if (b < 1048576) return Math.round(b / 1024) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }

    function setFile(file) {
      selectedFile = file;
      previewName.textContent = file.name;
      previewSize.textContent = formatBytes(file.size);
      previewThumb.src = URL.createObjectURL(file);
      previewRow.style.display = 'flex';
      convertBtn.disabled = false;
      resultSection.style.display = 'none';
      errorMsg.style.display = 'none';
    }

    fileInput.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]); });
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });

    removeBtn.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      previewRow.style.display = 'none';
      convertBtn.disabled = true;
      resultSection.style.display = 'none';
      errorMsg.style.display = 'none';
    });

    const steps = [
      { pct: 10, label: 'Uploading image...' },
      { pct: 30, label: 'Preprocessing image...' },
      { pct: 55, label: 'Vectorizing paths...' },
      { pct: 75, label: 'Smoothing curves...' },
      { pct: 90, label: 'Finalizing SVG...' },
    ];

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      svgContent = null;
      errorMsg.style.display = 'none';
      resultSection.style.display = 'none';
      progressWrap.style.display = 'block';
      convertBtn.disabled = true;
      startTime = Date.now();

      progressBar.style.width = '0%';
      progressPct.textContent = '0%';

      let stepIdx = 0;
      function advance() {
        if (stepIdx < steps.length) {
          const s = steps[stepIdx++];
          progressBar.style.width = s.pct + '%';
          progressText.textContent = s.label;
          progressPct.textContent = s.pct + '%';
        }
      }
      advance();
      const timer = setInterval(advance, 700);

      try {
        const formData = new FormData();
        formData.append('file', selectedFile);

        const res = await fetch(API_URL, { method: 'POST', body: formData });
        clearInterval(timer);

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(errText || 'Server error ' + res.status);
        }

        svgContent = await res.text();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1) + 's';

        progressBar.style.width = '100%';
        progressPct.textContent = '100%';
        progressText.textContent = 'Done!';

        setTimeout(() => {
          progressWrap.style.display = 'none';
          const blob = new Blob([svgContent], { type: 'image/svg+xml' });
          svgPreview.innerHTML = `<img src="${URL.createObjectURL(blob)}" alt="Vectorized SVG" />`;
          document.getElementById('statOrig').textContent = formatBytes(selectedFile.size);
          document.getElementById('statSvg').textContent  = formatBytes(svgContent.length);
          document.getElementById('statTime').textContent = elapsed;
          resultSection.style.display = 'block';
          convertBtn.disabled = false;
        }, 600);

      } catch (err) {
        clearInterval(timer);
        progressWrap.style.display = 'none';
        errorMsg.textContent = 'Error: ' + err.message;
        errorMsg.style.display = 'block';
        convertBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!svgContent) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([svgContent], { type: 'image/svg+xml' }));
      a.download = (selectedFile ? selectedFile.name.replace(/\.[^.]+$/, '') : 'vectorized') + '.svg';
      a.click();
    });

    copyBtn.addEventListener('click', () => {
      if (!svgContent) return;
      navigator.clipboard.writeText(svgContent).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy SVG', 2000);
      });
    });
  </script>
</body>
</html>
